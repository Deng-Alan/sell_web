server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: sell-web-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sell_web}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:20MB}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:sell-web-dev-jwt-secret-2026-keep-this-over-32-bytes}
  upload:
    base-dir: ${UPLOAD_BASE_DIR:uploads}
    public-prefix: ${UPLOAD_PUBLIC_PREFIX:/api/admin/uploads/files}
  frontend:
    revalidate-url: ${FRONTEND_REVALIDATE_URL:}
    revalidate-secret: ${REVALIDATE_SECRET:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3002,http://127.0.0.1:3002,http://localhost:3005,http://127.0.0.1:3005}
